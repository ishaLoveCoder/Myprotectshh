<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verifying Access...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050508;
  --card: #0d0d14;
  --border: rgba(255,255,255,0.06);
  --accent: #7c6aff;
  --green: #00e5a0;
  --red: #ff4560;
  --text: #f0f0ff;
  --muted: #5a5a7a;
}

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  position: relative;
}

.noise {
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

.glow { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; }
.g1 { width:500px; height:500px; background:var(--accent); opacity:0.07; top:-150px; left:-150px; animation: gf 12s ease-in-out infinite; }
.g2 { width:400px; height:400px; background:var(--green); opacity:0.05; bottom:-100px; right:-100px; animation: gf 15s ease-in-out infinite reverse; }
@keyframes gf { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }

.card {
  width: 380px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  position: relative; z-index: 10;
  box-shadow: 0 0 60px rgba(124,106,255,0.08), 0 40px 80px rgba(0,0,0,0.7);
  animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes rise { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.card-top-line {
  position: absolute; top:0; left:15%; right:15%; height:1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 999px;
}

.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.brand-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--green));
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--text); margin-bottom: 8px;
}
.sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 30px; }

.prog-wrap { height: 3px; background: #111120; border-radius: 999px; overflow: hidden; margin-bottom: 28px; }
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 999px; width: 0%;
  transition: width 0.5s ease;
}

.timeline { margin-bottom: 28px; }
.tl-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; position: relative;
}
.tl-item:not(:last-child)::after {
  content: '';
  position: absolute; left: 15px; top: 44px;
  width: 1px; height: 16px;
  background: var(--border);
}
.tl-dot {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; background: #0a0a12;
  transition: all 0.4s ease;
}
.tl-item.active .tl-dot { border-color: var(--accent); background: rgba(124,106,255,0.12); box-shadow: 0 0 12px rgba(124,106,255,0.3); }
.tl-item.done .tl-dot { border-color: var(--green); background: rgba(0,229,160,0.1); box-shadow: 0 0 12px rgba(0,229,160,0.2); }
.tl-label { font-size: 13px; color: var(--muted); font-weight: 500; transition: color 0.3s; flex: 1; }
.tl-item.active .tl-label, .tl-item.done .tl-label { color: var(--text); }

.spin {
  width: 12px; height: 12px;
  border: 2px solid rgba(124,106,255,0.2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to{transform:rotate(360deg)} }

.captcha-wrap {
  display: none;
  background: #0a0a12;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  align-items: center; gap: 14px;
  cursor: pointer;
  margin-bottom: 20px;
  transition: border-color 0.3s, box-shadow 0.3s;
  user-select: none;
}
.captcha-wrap:hover { border-color: rgba(124,106,255,0.35); box-shadow: 0 0 20px rgba(124,106,255,0.08); }
.captcha-wrap.done { border-color: rgba(0,229,160,0.35); cursor: default; }

.cap-box {
  width: 24px; height: 24px; border-radius: 5px;
  border: 2px solid var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; flex-shrink: 0;
}
.captcha-wrap:hover .cap-box { border-color: var(--accent); }
.captcha-wrap.done .cap-box { border-color: var(--green); background: rgba(0,229,160,0.15); }
.cap-label { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; }
.cap-spin {
  width: 14px; height: 14px;
  border: 2px solid rgba(124,106,255,0.2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}

.btn {
  width: 100%; padding: 15px;
  border-radius: 14px; border: none;
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
  background: linear-gradient(135deg, var(--accent), #9f96ff);
  color: white; cursor: not-allowed; opacity: 0.3;
  transition: all 0.3s;
}
.btn.on { opacity: 1; cursor: pointer; }
.btn.on:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124,106,255,0.4); }
.btn.on:active { transform: translateY(0); }

.status {
  text-align: center; font-size: 12px; color: var(--muted);
  margin-top: 12px; min-height: 16px; transition: color 0.3s;
}
.status.ok { color: var(--green); }
.status.err { color: var(--red); }

.footer {
  margin-top: 24px; padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sec-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); font-weight: 500; }
.ip-info { font-size: 10px; color: var(--muted); font-family: monospace; }

/* Error page */
.error-page {
  display: none; text-align: center;
}
.error-page.on { display: block; }
.error-icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="noise"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="card">
  <div class="card-top-line"></div>

  <!-- ERROR STATE -->
  <div class="error-page" id="errorPage">
    <div class="error-icon">🔒</div>
    <h1 id="errorTitle">Access Denied</h1>
    <p class="sub" id="errorMsg">This link is invalid or has expired.</p>
  </div>

  <!-- MAIN VERIFICATION -->
  <div id="mainPage">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-name">SecureGate</div>
    </div>

    <h1>Human Verification</h1>
    <p class="sub">Complete the steps below to securely access your link.</p>

    <div class="prog-wrap"><div class="prog-bar" id="pb"></div></div>

    <div class="timeline">
      <div class="tl-item active" id="t1">
        <div class="tl-dot">🛡️</div>
        <div class="tl-label">Browser integrity check</div>
        <div class="spin" id="sp1"></div>
      </div>
      <div class="tl-item" id="t2">
        <div class="tl-dot">👤</div>
        <div class="tl-label">Human verification</div>
      </div>
      <div class="tl-item" id="t3">
        <div class="tl-dot">🔒</div>
        <div class="tl-label">Secure tunnel opening</div>
      </div>
      <div class="tl-item" id="t4">
        <div class="tl-dot">🚀</div>
        <div class="tl-label">Redirecting</div>
      </div>
    </div>

    <div class="captcha-wrap" id="capWrap" onclick="doCaptcha()">
      <div class="cap-box" id="capBox">
        <div class="cap-spin" id="capSpin"></div>
        <span id="capCheck" style="display:none;color:var(--green);font-size:13px;font-weight:700;">✓</span>
      </div>
      <div class="cap-label">I'm not a robot</div>
      <svg width="28" height="28" viewBox="0 0 40 40" opacity="0.3">
        <circle cx="20" cy="20" r="18" fill="none" stroke="#7c6aff" stroke-width="2"/>
        <text x="50%" y="57%" text-anchor="middle" font-size="16" fill="#7c6aff">✓</text>
      </svg>
    </div>

    <button class="btn" id="mainBtn" disabled>Checking...</button>
    <div class="status" id="statusMsg"></div>

    <div class="footer">
      <div class="sec-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Server-side protected
      </div>
      <div class="ip-info" id="ipInfo">Verifying...</div>
    </div>
  </div>
</div>

<script>
// Link ID from URL params
const params = new URLSearchParams(location.search);
const LID = params.get('id');

let captchaDone = false;
let _a, _b;

const $ = id => document.getElementById(id);

// ── Helpers ──────────────────────────────────────────
function prog(n) { $('pb').style.width = n + '%'; }

function tlDone(n) {
  const el = $('t' + n);
  el.classList.remove('active');
  el.classList.add('done');
  el.querySelector('.tl-dot').textContent = '✅';
  const sp = el.querySelector('.spin');
  if (sp) sp.style.display = 'none';
}
function tlActive(n) { $('t' + n).classList.add('active'); }

function setStatus(msg, cls = '') {
  const el = $('statusMsg');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

function showError(title, msg) {
  $('mainPage').style.display = 'none';
  $('errorPage').classList.add('on');
  $('errorTitle').textContent = title;
  $('errorMsg').textContent = msg;
}

function fp() {
  return {
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    lang: navigator.language,
    w: screen.width,
    h: screen.height,
    dpr: window.devicePixelRatio,
    plat: navigator.platform,
    cd: screen.colorDepth,
    mem: navigator.deviceMemory || 0
  };
}

// ── STEP 1: Browser check → call gate function ───────
async function step1() {
  if (!LID) {
    showError('Invalid Link', 'No link ID provided in URL.');
    return;
  }

  $('sp1').style.display = 'block';
  prog(15);

  // Check for automation
  if (navigator.webdriver) {
    showError('Bot Detected', 'Automated browser detected. Please use a real browser.');
    return;
  }

  // Small delay — real browser feel + blocks instant scripts
  await sleep(1800);

  try {
    // Call Netlify function — gate checks IP, UA, issues token
    const r = await fetch('/.netlify/functions/gate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: LID, fp: fp() })
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      showError('Access Denied', err.error || 'Verification failed. Please try again.');
      return;
    }

    const d = await r.json();
    if (!d.a || !d.b) throw new Error('Token error');

    // Store split — never full token at once
    _a = d.a;
    _b = d.b;

    tlDone(1); tlActive(2); prog(35);
    $('capWrap').style.display = 'flex';
    setStatus('Complete the verification below');

  } catch (e) {
    showError('Error', 'Verification failed. Please refresh the page.');
  }
}

// ── STEP 2: Captcha ──────────────────────────────────
function doCaptcha() {
  if (captchaDone) return;
  const wrap = $('capWrap');
  $('capSpin').style.display = 'block';
  wrap.style.pointerEvents = 'none';

  setTimeout(() => {
    $('capSpin').style.display = 'none';
    $('capCheck').style.display = 'block';
    wrap.classList.add('done');
    captchaDone = true;

    tlDone(2); tlActive(3); prog(60);
    setStatus('');

    const btn = $('mainBtn');
    btn.textContent = 'Continue →';
    btn.classList.add('on');
    btn.disabled = false;
    btn.onclick = step3;
  }, 1500);
}

// ── STEP 3: Call proxy → get session → redirect ──────
async function step3() {
  const btn = $('mainBtn');
  btn.textContent = 'Opening secure tunnel...';
  btn.classList.remove('on');
  btn.disabled = true;
  setStatus('Establishing secure connection...');

  try {
    // Reconstruct token only now, then clear memory
    const token = _a + _b;
    _a = _b = null;

    // Call proxy function — server fetches shortener URL
    // We never receive the real URL — only a session token
    const r = await fetch('/.netlify/functions/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ t: token, fp: fp() })
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || 'Failed');
    }

    const d = await r.json();
    if (!d.session) throw new Error('No session');

    tlDone(3); tlActive(4); prog(90);
    setStatus('Redirecting securely...', 'ok');

    await sleep(400);

    // Redirect to /go?s=SESSION — server does the actual redirect
    // Shortener URL never appears anywhere client-side
    window.location.href = '/.netlify/functions/go?s=' + d.session;

  } catch (e) {
    setStatus('Session expired. Please refresh.', 'err');
    btn.textContent = 'Refresh →';
    btn.classList.add('on');
    btn.disabled = false;
    btn.onclick = () => location.reload();
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Boot
window.addEventListener('load', () => setTimeout(step1, 400));
</script>
</body>
</html>
